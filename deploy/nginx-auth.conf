worker_processes auto;

events { worker_connections 1024; }

http {
  upstream sentinel_frontend {
    server 127.0.0.1:8080;
  }

  upstream sentinel_explain_api {
    server 127.0.0.1:5001;
  }

  upstream oauth2_proxy {
    server 127.0.0.1:4180;
  }

  server {
    listen 443 ssl http2;
    server_name sentinel.example.com;

    # Configure real certificates in production.
    ssl_certificate /etc/ssl/certs/sentinel.crt;
    ssl_certificate_key /etc/ssl/private/sentinel.key;

    auth_request /oauth2/auth;
    error_page 401 = /oauth2/start;

    location = /oauth2/auth {
      proxy_pass http://oauth2_proxy;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Scheme $scheme;
      proxy_set_header X-Auth-Request-Redirect $request_uri;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
    }

    location /oauth2/ {
      proxy_pass http://oauth2_proxy;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Scheme $scheme;
    }

    location / {
      proxy_pass http://sentinel_frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(session|events|shap|analyze|health)$ {
      proxy_pass http://sentinel_explain_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-User $upstream_http_x_auth_request_user;
      proxy_set_header X-Forwarded-Email $upstream_http_x_auth_request_email;
      proxy_set_header X-Forwarded-Groups $upstream_http_x_auth_request_groups;
    }
  }
}
