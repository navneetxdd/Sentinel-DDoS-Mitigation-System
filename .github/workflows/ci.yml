name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check explain_api.py train_ml.py --select E,W,F --ignore E501

  frontend-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true

  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pip install pip-audit
      - run: pip-audit
        continue-on-error: true

  python-bandit:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - run: bandit -r . -x .venv,venv,__pycache__,.git,DDoS-Attack-Detection-and-Mitigation,NetDeflect,gatekeeper,SDNSecurity_DDOSMitigationDecisionTree_PortBlocking,Ddos-attack-detection-and-mitigation-using-ML -f json -o bandit-report.json || true
      - run: bandit -r . -x .venv,venv,__pycache__,.git,DDoS-Attack-Detection-and-Mitigation,NetDeflect,gatekeeper,SDNSecurity_DDOSMitigationDecisionTree_PortBlocking,Ddos-attack-detection-and-mitigation-using-ML -ll
        continue-on-error: true

  cppcheck:
    name: C/C++ SAST (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cppcheck
      - run: |
          cppcheck --enable=all --inconclusive --error-exitcode=0 \
            -I. -Isentinel_core -Il1_native -Iml_engine -Isdncontrol -Iwebsocket -Iproxy -Ifeedback \
            --suppress=missingIncludeSystem \
            sentinel_pipeline.c 2> cppcheck.out || true
      - run: |
          cppcheck --enable=all --inconclusive --error-exitcode=0 \
            -I. -Isentinel_core -Il1_native -Iml_engine -Isdncontrol -Iwebsocket -Iproxy -Ifeedback \
            --suppress=missingIncludeSystem \
            l1_native/*.c ml_engine/*.c sdncontrol/*.c websocket/*.c proxy/*.c feedback/*.c 2>> cppcheck.out || true
        continue-on-error: true
